<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歴 - 出席管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: #f5f5f5;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 24px 0;
        }
        .container {
            background: white; border-radius: 16px; padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 520px; width: 90%;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.3rem; color: #333; }
        .btn-back {
            padding: 8px 16px; font-size: 0.9rem;
            border: 1px solid #ddd; background: white; border-radius: 8px;
            cursor: pointer; color: #666; text-decoration: none;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px 8px; text-align: center;
            border-bottom: 1px solid #eee; font-size: 0.9rem;
        }
        th { color: #999; font-weight: 500; font-size: 0.8rem; }
        td { color: #333; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 打刻履歴</h1>
            <a class="btn-back" href="/">← 戻る</a>
        </div>

        <div class="loading" id="loading">読み込み中...</div>
        <div class="empty" id="empty" style="display:none">履歴はまだありません</div>

        <table id="table" style="display:none">
            <thead>
                <tr>
                    <th>日付</th><th>氏名</th><th>開始</th><th>終了</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script>
        async function load() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (!data.ok || data.records.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }

                document.getElementById('table').style.display = 'table';
                const tbody = document.getElementById('tbody');

                data.records.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r['日付'] || ''}</td>
                        <td>${r['氏名'] || ''}</td>
                        <td>${r['開始時刻'] || '-'}</td>
                        <td>${r['終了時刻'] || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loading').textContent = '読み込みエラー';
            }
        }
        load();
    </script>
</body>
</html>
